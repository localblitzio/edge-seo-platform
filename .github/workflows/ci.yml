name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Manual trigger — lets you re-run a deploy from the Actions UI without
  # needing to merge anything. Useful when a deploy step failed in isolation
  # or when you've manually `wrangler deploy`'d and want CI to be in sync.
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - main-worker
          - admin-worker
          - frontend-worker

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      # Integration tests are temporarily disabled in CI: the
      # @cloudflare/vitest-pool-workers runner on wrangler 3.114 has a
      # Cross-Request-Promise-Resolve race with Node IPC that hangs the
      # suite mid-run (see STATUS.md "Known issues / limitations" #1).
      # The 15 §12.2 scenarios in tests/integration/pipeline.test.ts are
      # checked in and the unit suite (280 tests) covers the same logic
      # at module level. Re-enable after the wrangler 4 + vitest-pool-
      # workers upgrade lands.
      # - run: npm run test:integration

  # Main edge worker deploy. Splitting this from the admin worker so a
  # failure on one doesn't block the other and so each surfaces as its own
  # job in the Actions UI (clearer signal of which target shipped).
  deploy-staging-main:
    name: Deploy main worker (staging)
    needs: verify
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'main-worker'))
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Apply D1 migrations (staging)
        run: npm run db:migrate:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy main worker (staging)
        run: npm run deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Admin worker deploy — independent of the main worker so a failure here
  # doesn't roll back a successful main worker deploy and vice versa. Both
  # workers read the same KV/D1, so order doesn't matter operationally.
  deploy-staging-admin:
    name: Deploy admin worker (staging)
    needs: verify
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'admin-worker'))
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Deploy admin worker (staging)
        run: npx wrangler deploy --config admin-worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Frontend worker deploy — Phase B+ user-facing landing, auth flows,
  # authenticated app dashboard, super-admin user CRUD. Replaces the
  # admin-worker functionality once Phase G cuts over.
  deploy-staging-frontend:
    name: Deploy frontend worker (staging)
    needs: verify
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend-worker'))
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Deploy frontend worker (staging)
        run: npx wrangler deploy --config frontend-worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-production:
    name: Deploy to production
    needs: [deploy-staging-main, deploy-staging-admin, deploy-staging-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      # Manual approval gate per spec §13.3 — configure required reviewers
      # on the production environment in repo settings.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Apply D1 migrations (production)
        run: npm run db:migrate:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker (production)
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
