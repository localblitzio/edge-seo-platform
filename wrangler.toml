name = "edge-seo-platform"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# ---------------------------------------------------------------------------
# Default (local dev) bindings.
#
# Wrangler 3 runs `wrangler dev` with --local by default. In local mode
# the IDs below are NOT validated against Cloudflare; they only need to
# look syntactically valid. Real production IDs are populated under the
# [env.staging] and [env.production] blocks below.
#
# Run `npm run wrangler:types` whenever you change bindings to regenerate
# the typed Env interface in `worker-configuration.d.ts`.
# ---------------------------------------------------------------------------

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "00000000000000000000000000000001"

[[d1_databases]]
binding = "CONFIG_DB"
database_name = "edge-seo-platform-local"
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "CONTENT_R2"
bucket_name = "edge-seo-content-local"

[[r2_buckets]]
binding = "LOGS_R2"
bucket_name = "edge-seo-logs-local"

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "edge_seo_metrics_local"

# ---------------------------------------------------------------------------
# Production (proxy worker — serves real customer traffic)
# ---------------------------------------------------------------------------
# History note: Cloudflare resource names use the legacy "staging"
# suffix (the script + D1 + R2 buckets were created when this was
# the only environment). The wrangler env label is `production`
# because that's what this environment IS — live traffic. Don't
# let the names confuse you; the migration to rename CF-side
# resources isn't worth the risk.
[env.production]
name = "edge-seo-platform-staging"
workers_dev = true

# Platform proxy zone routes — every client whose proxy_domain ends with
# one of these zones is dispatched to this worker. Each zone has a
# wildcard DNS record (`*` → 192.0.2.1, proxied) that accepts the
# traffic; the routes below hand it to the worker.
#
# Zone list is mirrored in src/config/proxy-zone.ts (PROXY_ZONES).
# Adding a new zone requires: (1) DNS wildcard A on the zone,
# (2) a route entry here, (3) appending to PROXY_ZONES.
[[env.production.routes]]
pattern = "*.localpage.us.com/*"
zone_name = "localpage.us.com"

[[env.production.routes]]
pattern = "*.localsite.us.com/*"
zone_name = "localsite.us.com"

# In-place mode: 404-media.com client.
[[env.production.routes]]
pattern = "404-media.com/*"
zone_name = "404-media.com"

# In-place mode: seoinencinitas.com client (Pages-hosted).
[[env.production.routes]]
pattern = "seoinencinitas.com/*"
zone_name = "seoinencinitas.com"

[[env.production.kv_namespaces]]
binding = "CONFIG_KV"
id = "dc95f90063cd4493bb3ea462759f4002"

[[env.production.d1_databases]]
binding = "CONFIG_DB"
database_name = "edge-seo-platform-staging"
database_id = "a6c1786a-4999-4ac5-ad60-7faafec61283"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "CONTENT_R2"
bucket_name = "edge-seo-content-staging"

[[env.production.r2_buckets]]
binding = "LOGS_R2"
bucket_name = "edge-seo-logs-staging"

[[env.production.analytics_engine_datasets]]
binding = "METRICS"
dataset = "edge_seo_metrics_staging"

# ---------------------------------------------------------------------------
# Staging (proxy worker — empty sandbox for iterating on changes)
# ---------------------------------------------------------------------------
# Resources provisioned 2026-05-13. Empty DB, separate KV/R2 — no
# real customer data. No zone routes — the staging proxy worker
# only serves via the workers.dev URL for end-to-end smoke tests.
# Operator-facing flows happen through `edge-seo-frontend-stage`
# (admin UI on staging.edgeseo.app), which binds to the SAME D1
# below so admin actions land on the same staging data.
[env.staging]
name = "edge-seo-platform-stage"
workers_dev = true

[[env.staging.kv_namespaces]]
binding = "CONFIG_KV"
id = "e1ad7d59d73d4097956b4c8d46327dce"

[[env.staging.d1_databases]]
binding = "CONFIG_DB"
database_name = "edge-seo-platform-stage"
database_id = "a2757965-faf9-4713-8449-d1f379e872ba"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "CONTENT_R2"
bucket_name = "edge-seo-content-stage"

[[env.staging.r2_buckets]]
binding = "LOGS_R2"
bucket_name = "edge-seo-logs-stage"

[[env.staging.analytics_engine_datasets]]
binding = "METRICS"
dataset = "edge_seo_metrics_stage"

# mTLS certificate bindings are added per-client on onboarding when a route
# uses `origin_auth: { type: "mtls" }`. Example:
#   [[env.production.mtls_certificates]]
#   binding = "CLIENT_X_MTLS"
#   certificate_id = "<uploaded-cert-id>"
